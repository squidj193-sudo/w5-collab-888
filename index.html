<!DOCTYPE html>
<html lang="zh-Hant">

<head>
  <meta charset="UTF-8">
  <title>我們組的 Chatbot</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="container">
    <header>
      <!-- 組長任務：把標題改成你們組的名字 -->
      <h1>🤖 第 X 組的 Chatbot</h1>
      <p class="subtitle">W5 PR 協作練習</p>
      <!-- 組員 D 任務：深色模式切換按鈕 -->
      <button id="dark-mode-toggle" onclick="toggleDarkMode()">🌙</button>
    </header>
    <p id="char-count">字數：0</p>
    <!-- 組員 D 任務：在 header 加深色模式切換按鈕 -->

    <div id="chat-box">
      <div class="message bot">
        嗨！這是我們組用 PR 協作做出來的 Chatbot 🎉
        <span class="timestamp"></span>
      </div>
    </div>

    <div class="input-area">
      <input id="user-input" type="text" placeholder="輸入訊息...">
      <button onclick="sendMessage()">送出</button>
      <!-- 組員 B 任務：在這裡加清除按鈕 -->
      <button onclick="clearChat()">清除</button>
    </div>

    <!-- 組員 E 任務：在這裡加鍵盤快捷鍵說明 -->
    <p class="shortcut-hint" style="font-size: 0.9em; color: #666; text-align: center; margin-top: 10px;">💡 提示：按 <strong>Enter</strong> 鍵可以快速送出訊息</p>
    <footer></footer>
  </div>

  <script>
    function sendMessage() {
      const input = document.getElementById('user-input');
      const chatBox = document.getElementById('chat-box');
      const text = input.value.trim();

      if (!text) return;

      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

      const userDiv = document.createElement('div');
      userDiv.className = 'message user';
      userDiv.innerHTML = `${text}<span class="timestamp">${timeStr}</span>`;
      chatBox.appendChild(userDiv);

      const botDiv = document.createElement('div');
      botDiv.className = 'message bot';
      botDiv.innerHTML = `你說了「${text}」！<span class="timestamp">${timeStr}</span>`;
      chatBox.appendChild(botDiv);

      input.value = '';
      updateCharCount(); // 送出後重置字數
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    document.getElementById('user-input').addEventListener('keypress', function (e) {
      if (e.key === 'Enter') sendMessage();
    });

    // 組員 B 任務：在這裡加 clearChat() 函數
    function clearChat() {
      document.getElementById('chat-box').innerHTML = '<div class="message bot">嗨！這是我們組用 PR 協作做出來的 Chatbot 🎉</div>';
    }
    // 組員 C 任務：在這裡加字數統計更新邏輯
    function updateCharCount() {
      const input = document.getElementById('user-input');
      const countDisplay = document.getElementById('char-count');
      if (input && countDisplay) {
        countDisplay.textContent = `字數：${input.value.length}`;
      }
    }

    document.getElementById('user-input').addEventListener('input', updateCharCount);
    // 組員 D 任務：在這裡加深色模式切換函數
    window.onload = function () {
      const now = new Date();
      const timeStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      document.querySelector('.message.bot .timestamp').textContent = timeStr;
    };
    // 組員 D 任務：深色模式切換函數
    function toggleDarkMode() {
      document.body.classList.toggle('dark');
      const btn = document.getElementById('dark-mode-toggle');
      btn.textContent = document.body.classList.contains('dark') ? '☀️' : '🌙';
    }
  </script>

</body>

</html>
